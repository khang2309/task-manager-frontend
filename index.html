<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Task Manager App</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 400px; margin: 50px auto; text-align: center; }
        input { padding: 10px; width: 65%; }
        button { padding: 10px; cursor: pointer; }
        ul { list-style-type: none; padding: 0; margin-top: 20px; }
        li { padding: 10px; background: #eef2f3; margin: 5px 0; border-radius: 4px; text-align: left; }
    </style>
</head>
<body>
    <h2>Task Manager App</h2>
    <input type="text" id="task-input" placeholder="Nhập công việc mới...">
    <button onclick="addTask()">Add Task</button>
    <ul id="task-list"></ul>

    <script src="script.js"></script>
</body>
</html>
